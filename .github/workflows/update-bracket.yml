name: Update bracket

# Free live-data path for a static Vercel deploy:
# on a schedule, fetch the provider, rewrite public/bracket.json if anything
# changed, and push. The push triggers Vercel's auto-deploy, so the site picks
# up new scores within a few minutes — no server, no paid plan.
#
# Setup:
#   1. Repo, Settings, Secrets and variables, Actions: add FOOTBALL_DATA_TOKEN
#      (a free token from football-data.org, whose free tier covers the WC).
#   2. Connect the repo to Vercel (auto-deploys on push to the default branch).
#
# Scheduling reality (per GitHub docs): the shortest allowed interval is 5
# minutes, but scheduled runs are best-effort. "The schedule event can be
# delayed during periods of high loads of GitHub Actions workflow runs. High
# load times include the start of every hour ... If the load is sufficiently
# high enough, some queued jobs may be dropped." So */5 (which fires at :00,
# :05, :10 ... every one a multiple of 5, and :00 is the worst minute) is the
# most-dropped schedule possible. We use offset minutes (:02, :07, :12 ...) to
# dodge the busy slots. Runs may still be delayed/dropped; for guaranteed
# cadence, trigger workflow_dispatch from an external cron (see README).
# Each run makes one provider call (free tier ~10 req/min; GITHUB_TOKEN 1,000
# req/hr) and public-repo Actions minutes are unlimited, so frequency is free.
#
# Auto-stop: after the final (cutoff = 00:00 UTC the day after the latest
# kickoff in bracket.json) the job disables this workflow, so it stops running
# once the tournament is over. Re-enable it from the Actions tab if needed.
# (Public repos also auto-disable scheduled workflows after 60 days of no repo
# activity, which won't happen mid-tournament.)

on:
  schedule:
    # Every 5 minutes, offset to :02/:07/... — never on the hour, never a
    # multiple of 5, to minimise GitHub's high-load drops.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # lets the job disable itself after the final

concurrency:
  group: update-bracket
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Tournament window (auto-stop after the final)
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Disable only once the tournament is truly over: EVERY match final,
          # and past 00:00 UTC the day after the last kickoff. Dates alone are
          # not enough: an unseeded tie (e.g. the final before the semis wrap)
          # has no kickoff, so the max-kickoff cutoff once fired 4 days early
          # and shut the pipeline down mid-tournament.
          CUTOFF=$(node -e "const d=require('./public/bracket.json');const ms=d.rounds.flatMap(r=>r.matches);if(!ms.length||ms.some(m=>m.status!=='final')){console.log('999999999999999');process.exit(0)}const ks=ms.map(m=>m.kickoff).filter(Boolean).map(s=>Date.parse(s));const c=new Date(Math.max(...ks));console.log(Date.UTC(c.getUTCFullYear(),c.getUTCMonth(),c.getUTCDate()+1,0,0,0))")
          NOW=$(date -u +%s%3N)
          echo "now    = $(date -u)"
          echo "cutoff = $(date -u -d @$((CUTOFF/1000)) 2>/dev/null || echo 'tournament still in progress')"
          if [ "$NOW" -ge "$CUTOFF" ]; then
            echo "Tournament over — disabling this workflow."
            gh workflow disable "${{ github.workflow }}" --repo "$GITHUB_REPOSITORY" \
              || echo "(couldn't disable — the steps below are skipped anyway)"
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.active == 'true'
        with:
          node-version: 22

      - name: Rebuild bracket from football-data.org
        if: steps.guard.outputs.active == 'true'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          if [ -z "$FOOTBALL_DATA_TOKEN" ]; then
            echo "::error::FOOTBALL_DATA_TOKEN secret is not set. Add it in Settings > Secrets and variables > Actions, then re-run."
            exit 1
          fi
          node update-bracket.mjs

      - name: Commit & push if bracket.json changed
        if: steps.guard.outputs.active == 'true'
        run: |
          if [ -n "$(git status --porcelain public/bracket.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/bracket.json
            git commit -m "chore: update live bracket data"
            git push
            echo "pushed updated bracket.json"
          else
            echo "no change"
          fi
