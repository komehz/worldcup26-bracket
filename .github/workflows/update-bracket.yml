name: Update bracket

# Free live-data path for a static Vercel deploy:
# on a schedule, fetch the provider, rewrite public/bracket.json if anything
# changed, and push. The push triggers Vercel's auto-deploy, so the site picks
# up new scores within a few minutes — no server, no paid plan.
#
# Setup:
#   1. Repo → Settings → Secrets and variables → Actions → add:
#        API_FOOTBALL_KEY, LEAGUE_ID, SEASON
#   2. Connect the repo to Vercel (auto-deploys on push to the default branch).
#
# Rate limits: update-bracket only calls the provider when a match is live or
# about to kick off (see inMatchWindow in update-bracket.mjs). So this 5-minute
# schedule spends API requests *only* during match windows — with 1–2 matches a
# day that's ~24–48 requests/day, well under the free ~100/day tier, while
# giving ~5-minute freshness during play. Idle ticks make zero API calls.
# (Public-repo Actions minutes are free/unlimited; private repos get 2,000/mo.)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-bracket
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch results + resolve advancement
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          LEAGUE_ID: ${{ secrets.LEAGUE_ID }}
          SEASON: ${{ secrets.SEASON }}
        run: node update-bracket.mjs

      - name: Commit & push if bracket.json changed
        run: |
          if [ -n "$(git status --porcelain public/bracket.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/bracket.json
            git commit -m "chore: update live bracket data"
            git push
            echo "pushed updated bracket.json"
          else
            echo "no change"
          fi
